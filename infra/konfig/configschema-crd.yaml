apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: configschemas.konfig.io
  annotations:
    # Establish before the Deployment so the ConfigSchema watcher (CU-86ahrwd5g)
    # does not panic at startup, same as configs.konfig.io / configacls.konfig.io.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  group: konfig.io
  # Namespaced (like Config, unlike the cluster-scoped ConfigACL). A
  # ConfigSchema in namespace N with configName: foo governs the Config named
  # foo in namespace N. The watcher uses Api::all_with to watch every namespace
  # and keys its registry by (object namespace, spec.configName). RBAC: see
  # clusterrole.yaml (configschemas get/list/watch).
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - configName
                - schema
              properties:
                configName:
                  type: string
                  description: >-
                    Name (.metadata.name) of the Config, in THIS namespace, that
                    this schema governs. On Apply, the server validates the
                    Config's content against `schema` before patching.
                schema:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  description: >-
                    A draft-07 JSON Schema document. Compiled once at CRD-load
                    time; Applies whose content violates it are rejected with
                    FAILED_PRECONDITION. A schema that fails to compile is
                    skipped (logged server-side) and never enforced.
  names:
    plural: configschemas
    singular: configschema
    kind: ConfigSchema
    shortNames:
      - cschema
