name: Flamediff CPU Regression Gate (CU-86ahtj1a8)
on:
  pull_request:
    branches: [main]
    # `labeled` so adding the `profiling` label to an open PR triggers the
    # opt-in capture-gate (the default types don't fire on label changes).
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      capture_window:
        description: "Pyroscope render window (e.g. 10m) for the flamediff capture"
        required: false
        default: "10m"
      seed_baseline:
        description: "true = ignore any checked-in baseline and emit current.json as a fresh seed"
        required: false
        default: "false"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# LOAD-3 (CU-86ahtj1a8): top-5 CPU frame regression gate.
#
# The gate LOGIC lives in the Rust bin //tools/konfig-flamediff and is unit-
# tested by `bazel test` in the CI "Build and test" job — so the threshold /
# noise-floor / new-frame math is enforced on EVERY PR without a cluster. This
# workflow is only the heavy CAPTURE job that produces a real profile to gate.
#
# Ingestion path = Grafana Alloy `pyroscope.ebpf` DaemonSet (infra/profiling/),
# NOT the in-process pyroscope agent. The in-process agent crashes under kind's
# default seccomp (`create profiler error`) and does not ingest into Pyroscope
# 1.9.0 (legacy /ingest) — see tools/profiling/README.md. eBPF scrapes the plain
# konfig pod externally, so no agent, no seccomp fiddling. The konfig image is
# built `--config=x86-baseline` (fastbuild, frame-pointers on, NOT stripped) so
# eBPF can symbolize `konfig::...` frames; `--config=release` would strip them.
# The gate is RELATIVE (current vs baseline, same build), so a fastbuild profile
# is still valid for catching a hot-path regression.
#
# Opt-in only (see the `if:` below) so an unverified eBPF capture never blocks an
# unrelated PR. When no `.profiling-baseline.json` is checked in it runs in SEED
# mode: uploads current.json as `profiling-baseline-seed` and never fails.
#
# Tracker: CU-86ahtj1a8 (Phase 7). Capture stack mirrors profile-release.yml.
jobs:
  capture-gate:
    name: capture CPU profile + gate vs baseline (kind + alloy eBPF + pyroscope)
    # Opt-in: push to main (refresh + post-merge detection), manual dispatch
    # (seeding / on-demand), or a PR explicitly labeled `profiling` (to prove the
    # gate fires). Normal PRs skip this heavy job entirely — it is NON-BLOCKING.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'profiling')
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      BB_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
      WINDOW: ${{ inputs.capture_window || '10m' }}
      SEED: ${{ inputs.seed_baseline || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: bazelbuild/setup-bazelisk@v3

      - name: Install protoc
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q protobuf-compiler

      - name: Configure Bazel for CI (BuildBuddy remote cache)
        run: |
          cat > .bazelrc.user << EOF
          common --config=ci
          common --remote_cache=grpcs://remote.buildbuddy.io
          common --remote_header=x-buildbuddy-api-key=$BB_API_KEY
          build --build_metadata=BRANCH_NAME=${{ github.ref_name }}
          build --build_metadata=COMMIT_SHA=${{ github.sha }}
          build --build_metadata=REPO_URL=https://github.com/jayakasadev/konfig
          EOF

      - name: CPU capability probe (cx16 — snmalloc SIGILL guard)
        run: |
          if grep -qm1 cx16 /proc/cpuinfo; then echo "host: cx16 PRESENT"; else echo "host: cx16 MISSING"; fi

      - name: Build konfig + konfig-loadtest images + flamediff bin (linux/amd64)
        # Plain konfig image (no in-process pyroscope agent). x86-baseline is
        # fastbuild + frame-pointers + NOT stripped, so eBPF can name frames.
        run: |
          bazel run --config=x86-baseline //docker/konfig:load_amd64
          bazel run --config=x86-baseline //docker/konfig-loadtest:load_amd64
          bazel build //tools/konfig-flamediff:konfig_flamediff
          echo "FLAMEDIFF=$PWD/$(bazel cquery --output=files //tools/konfig-flamediff:konfig_flamediff 2>/dev/null)" >> "$GITHUB_ENV"

      - name: Create kind cluster (1 node)
        uses: helm/kind-action@v1
        with:
          cluster_name: konfig-flamediff
          wait: 120s

      - name: Load images into kind (poll containerd image store)
        run: |
          kind load docker-image kasa288/konfig:latest --name konfig-flamediff
          kind load docker-image kasa288/konfig-loadtest:latest --name konfig-flamediff
          for img in kasa288/konfig:latest kasa288/konfig-loadtest:latest; do
            repo="${img%:*}"; tag="${img##*:}"; ok=0
            for i in $(seq 1 60); do
              if docker exec konfig-flamediff-control-plane crictl images 2>/dev/null \
                   | awk -v r="docker.io/$repo" -v t="$tag" '$1==r && $2==t {f=1} END{exit !f}'; then
                echo "  -> $img visible after ${i}s"; ok=1; break
              fi
              sleep 1
            done
            [ "$ok" -eq 1 ] || { echo "::error::timeout for $img"; exit 1; }
          done

      - name: Apply CRDs + RBAC + Service + ConfigMap + seed Config
        run: |
          kubectl apply -f infra/konfig/crd.yaml
          kubectl wait --for=condition=Established crd/configs.konfig.io --timeout=60s
          kubectl apply -f infra/konfig/namespace.yaml
          kubectl apply -f infra/konfig/serviceaccount.yaml
          kubectl apply -f infra/konfig/clusterrole.yaml
          kubectl apply -f infra/konfig/clusterrole-configmap.yaml
          kubectl apply -f infra/konfig/clusterrolebinding.yaml
          kubectl apply -f infra/konfig/clusterrolebinding-configmap.yaml
          kubectl apply -f infra/konfig/role-secret.yaml
          kubectl apply -f infra/konfig/service.yaml
          kubectl create configmap konfig-config \
            --namespace=konfig-system \
            --from-literal=namespace=konfig-system \
            --from-literal=name=konfig-loadtest \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f infra/konfig-loadtest/seed-config.yaml

      - name: Deploy pyroscope + alloy eBPF (infra/profiling)
        run: |
          kubectl apply -f infra/profiling/namespace.yaml
          kubectl apply -f infra/profiling/pyroscope-configmap.yaml
          kubectl apply -f infra/profiling/pyroscope-deployment.yaml
          kubectl apply -f infra/profiling/pyroscope-service.yaml
          kubectl rollout status -n profiling deploy/pyroscope --timeout=180s
          kubectl apply -f infra/profiling/alloy-rbac.yaml
          kubectl apply -f infra/profiling/alloy-config.yaml
          kubectl apply -f infra/profiling/alloy-daemonset.yaml
          kubectl rollout status -n profiling daemonset/alloy --timeout=180s

      - name: Deploy konfig (plain image, 1 replica, --tls=false, reliable startup)
        # Reuses the loadtest-gate's battle-tested startup tweaks (IfNotPresent,
        # tls off, bumped probe delays/threshold, sync logs). No PYROSCOPE_* env:
        # alloy eBPF scrapes this pod externally by the `app=konfig` label.
        run: |
          yq '
            .spec.replicas = 1
            | (.spec.template.spec.containers[] | select(.name == "konfig")).imagePullPolicy = "IfNotPresent"
            | (.spec.template.spec.containers[] | select(.name == "konfig")).args |=
                ([.[] | select(test("^--tls") | not)] + ["--tls=false"])
            | (.spec.template.spec.containers[] | select(.name == "konfig")).readinessProbe.initialDelaySeconds = 15
            | (.spec.template.spec.containers[] | select(.name == "konfig")).livenessProbe.initialDelaySeconds = 15
            | (.spec.template.spec.containers[] | select(.name == "konfig")).livenessProbe.failureThreshold = 6
            | (.spec.template.spec.containers[] | select(.name == "konfig")).env += [{"name": "KONFIG_LOG_SYNC", "value": "1"}]
            | del(.spec.template.spec.containers[] | select(.name == "konfig").volumeMounts[] | select(.name == "konfig-tls"))
            | del(.spec.template.spec.volumes[] | select(.name == "konfig-tls"))
          ' infra/konfig/deployment.yaml | kubectl apply -f -
          kubectl rollout status -n konfig-system deploy/konfig --timeout=180s
          kubectl wait --for=condition=Ready -n konfig-system pod -l app=konfig --timeout=180s

      - name: Run saturate loadtest (CU-LOAD-1) and let alloy scrape
        run: |
          sed 's/imagePullPolicy: Always/imagePullPolicy: IfNotPresent/' \
            infra/konfig-loadtest/job-saturate.yaml | kubectl apply -f -
          for _ in $(seq 1 60); do
            ph=$(kubectl get pods -n konfig-system -l job-name=konfig-loadtest-saturate \
                   -o jsonpath='{.items[0].status.phase}' 2>/dev/null || true)
            [ "$ph" = "Running" ] || [ "$ph" = "Succeeded" ] || [ "$ph" = "Failed" ] && break
            sleep 2
          done
          kubectl logs -n konfig-system -f job/konfig-loadtest-saturate --all-containers=true || true
          # alloy collect_interval is 10s; give it a few cycles to ship to pyroscope.
          sleep 30

      - name: Capture top-5 CPU frames (pyroscope render -> current.json)
        run: |
          mkdir -p flamediff-out
          kubectl -n profiling port-forward svc/pyroscope 4040:4040 >flamediff-out/pf.log 2>&1 &
          PF=$!; trap 'kill "$PF" 2>/dev/null || true' EXIT
          for _ in $(seq 1 30); do
            curl -fsS -o /dev/null --max-time 2 http://localhost:4040/ready && break
            sleep 1
          done
          # eBPF profile type (validated query, Pyroscope 1.9.0, CU-86ahtj1a8 standup).
          QUERY='process_cpu:samples:count:cpu:nanoseconds{service_name="konfig"}'
          curl -fsS -G http://localhost:4040/pyroscope/render \
            --data-urlencode "query=${QUERY}" \
            --data-urlencode "from=now-${WINDOW}" \
            --data-urlencode "format=json" \
            -o flamediff-out/cpu.flamebearer.json \
            && echo "flamebearer: $(stat -c '%s' flamediff-out/cpu.flamebearer.json) bytes" \
            || echo "::warning::flamebearer render failed"
          if [ ! -s flamediff-out/cpu.flamebearer.json ]; then
            echo "::warning::empty flamebearer — no CPU samples ingested"
            echo "EMPTY_CAPTURE=1" >> "$GITHUB_ENV"; exit 0
          fi
          "$FLAMEDIFF" top-frames flamediff-out/cpu.flamebearer.json --top 5 -o flamediff-out/current.json
          echo "=== current.json (top-5 self%) ==="; cat flamediff-out/current.json

      - name: Flamediff gate (compare vs .profiling-baseline.json)
        run: |
          if [ "${EMPTY_CAPTURE:-0}" = "1" ]; then
            { echo "## Flamediff — no CPU samples captured";
              echo "Alloy eBPF ingested no samples for \`service_name=konfig\` in the window.";
              echo "Nothing to gate; passing (never a false regression on empty data)."; } \
              >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ -f .profiling-baseline.json ] && [ "$SEED" != "true" ]; then
            echo "baseline present -> gating (exit 1 on >20% top-5 regression)"
            "$FLAMEDIFF" gate flamediff-out/current.json .profiling-baseline.json \
              --output "$GITHUB_STEP_SUMMARY"
          else
            echo "seed mode ($([ -f .profiling-baseline.json ] && echo 'seed_baseline=true' || echo 'no baseline checked in'))"
            cp flamediff-out/current.json flamediff-out/profiling-baseline-seed.json
            { echo "## Flamediff — baseline seed (no gate this run)";
              echo "";
              echo "Download the **profiling-baseline-seed** artifact and commit its";
              echo "\`profiling-baseline-seed.json\` as \`.profiling-baseline.json\` at the repo";
              echo "root to arm the gate.";
              echo "";
              echo "\`\`\`json"; cat flamediff-out/current.json; echo "\`\`\`"; } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload flamediff artifacts (current.json / flamebearer / seed)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flamediff-${{ github.run_id }}
          path: flamediff-out/
          retention-days: 30

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -A || true
          kubectl logs -n konfig-system -l app=konfig --tail=200 || true
          kubectl logs -n profiling -l app.kubernetes.io/name=alloy --tail=100 || true
          kubectl logs -n profiling -l app=alloy --tail=100 || true
          kubectl logs -n profiling -l app=pyroscope --tail=100 || true
          kubectl get events -A --sort-by=.lastTimestamp | tail -50 || true
