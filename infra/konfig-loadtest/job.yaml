apiVersion: batch/v1
kind: Job
metadata:
  name: konfig-loadtest
  namespace: konfig-system
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: konfig-loadtest
          image: kasa288/konfig-loadtest:latest
          imagePullPolicy: Always
          args:
            - --addr
            - http://konfig.konfig-system.svc.cluster.local:50051
            - --namespace
            - konfig-system
            - --config-name
            - konfig-loadtest
            - --secret-name
            - konfig-loadtest-secret
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: 2
              memory: 512Mi
