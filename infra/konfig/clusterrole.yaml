apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: konfig-config-access
rules:
  - apiGroups: ["konfig.io"]
    resources: ["configs"]
    verbs: ["get", "list", "watch", "patch", "create"]
  # Per-tenant authz (CU-86ahrwd6f): the cluster-scoped ConfigACL watcher needs
  # to list/watch ConfigACLs across the whole cluster. Read-only — konfig never
  # mutates ACLs, operators manage them out-of-band.
  - apiGroups: ["konfig.io"]
    resources: ["configacls"]
    verbs: ["get", "list", "watch"]
  # JSON Schema validation (CU-86ahrwd5g): the ConfigSchema watcher lists/watches
  # ConfigSchemas across all namespaces (Api::all_with). Read-only — konfig never
  # mutates schemas; operators register them out-of-band.
  - apiGroups: ["konfig.io"]
    resources: ["configschemas"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
