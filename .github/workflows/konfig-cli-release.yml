name: konfig-cli release
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.1.0)"
        required: true
        type: string
  push:
    tags:
      - "konfig-cli/v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# CU-86aj08vcu: cross-compiled konfig-cli tarballs for darwin-arm64, linux-amd64,
# linux-arm64 — each built on its NATIVE runner (no --platforms cross wiring;
# the old //bazel/platforms:* labels never existed and the build never ran). The
# release job cuts one combined SHA256SUMS + cosign-signs each tarball keyless
# (verify-blob works with no key) and attaches everything to the GitHub Release.
jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: blacksmith-2vcpu-ubuntu-2404
          - name: linux-arm64
            runner: blacksmith-2vcpu-ubuntu-2404-arm
          - name: darwin-arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: bazelbuild/setup-bazelisk@v3

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y -q protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install Rust toolchain (macOS)
        if: runner.os == 'macOS'
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
            ~/.cache/bazel-repo-cache
          key: bazel-konfig-cli-${{ matrix.name }}-${{ hashFiles('Cargo.lock', 'MODULE.bazel.lock') }}
          restore-keys: bazel-konfig-cli-${{ matrix.name }}-

      - name: Build (native)
        run: bazel build //tools/konfig-cli:konfig_cli

      - name: Package konfig-cli-${{ matrix.name }}.tar.gz
        run: |
          BIN=$(bazel cquery --output=files //tools/konfig-cli:konfig_cli 2>/dev/null | head -1)
          mkdir -p dist
          cp "$BIN" dist/konfig-cli
          tar -C dist -czf "dist/konfig-cli-${{ matrix.name }}.tar.gz" konfig-cli

      - uses: actions/upload-artifact@v4
        with:
          name: konfig-cli-${{ matrix.name }}
          path: dist/konfig-cli-${{ matrix.name }}.tar.gz
          retention-days: 1

  release:
    name: Sign + publish release to jayakasadev/konfig
    needs: build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
      id-token: write # cosign keyless sign-blob (OIDC → Fulcio); no key material
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: konfig-cli-*
          merge-multiple: true
          path: dist/

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME#konfig-cli/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checksums (single SHA256SUMS over all tarballs)
        working-directory: dist
        run: |
          sha256sum konfig-cli-*.tar.gz > SHA256SUMS
          echo "=== SHA256SUMS ==="; cat SHA256SUMS

      - name: Cosign sign-blob each tarball (keyless, bundled)
        working-directory: dist
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          for tgz in konfig-cli-*.tar.gz; do
            cosign sign-blob --yes --bundle "${tgz}.cosign.bundle" "$tgz"
            echo "signed $tgz -> ${tgz}.cosign.bundle"
          done

      - name: Show artifacts
        run: ls -lh dist/

      - name: Write release notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ID_RE="https://github.com/${{ github.repository }}/.github/workflows/konfig-cli-release.yml@${{ github.ref }}"
          cat > release-notes.md << EOF
          ## Install

          \`\`\`bash
          # pick your platform
          curl -sSL https://github.com/jayakasadev/konfig/releases/download/${TAG}/konfig-cli-darwin-arm64.tar.gz | tar -xz
          curl -sSL https://github.com/jayakasadev/konfig/releases/download/${TAG}/konfig-cli-linux-amd64.tar.gz | tar -xz
          curl -sSL https://github.com/jayakasadev/konfig/releases/download/${TAG}/konfig-cli-linux-arm64.tar.gz | tar -xz
          sudo mv konfig-cli /usr/local/bin/
          \`\`\`

          ## Verify (checksum + cosign, keyless)

          \`\`\`bash
          curl -sSLO https://github.com/jayakasadev/konfig/releases/download/${TAG}/SHA256SUMS
          sha256sum -c SHA256SUMS --ignore-missing

          # cosign verify-blob (no key needed):
          cosign verify-blob \\
            --bundle konfig-cli-linux-amd64.tar.gz.cosign.bundle \\
            --certificate-identity "${ID_RE}" \\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \\
            konfig-cli-linux-amd64.tar.gz
          \`\`\`

          Built from commit \`${{ github.sha }}\`.
          EOF

      # Guarded on the token via env (secrets.* is not visible to step `if:` on
      # every runner). No-ops on forks / when the token is unset, so a dispatch
      # run still builds + signs + checksums for verification without cutting a
      # release.
      - name: Create release in jayakasadev/konfig
        env:
          GH_TOKEN: ${{ secrets.KONFIG_RELEASE_TOKEN }}
        run: |
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "KONFIG_RELEASE_TOKEN is unset; skipping release publish (artifacts + signatures still built)." >&2
            exit 0
          fi
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" \
            --repo jayakasadev/konfig \
            --title "konfig-cli $TAG" \
            --notes-file release-notes.md \
            dist/konfig-cli-linux-amd64.tar.gz \
            dist/konfig-cli-linux-arm64.tar.gz \
            dist/konfig-cli-darwin-arm64.tar.gz \
            dist/SHA256SUMS \
            dist/konfig-cli-linux-amd64.tar.gz.cosign.bundle \
            dist/konfig-cli-linux-arm64.tar.gz.cosign.bundle \
            dist/konfig-cli-darwin-arm64.tar.gz.cosign.bundle
