apiVersion: apps/v1
kind: Deployment
metadata:
  name: konfig
  namespace: konfig-system
spec:
  # 1 replica for load testing (per project rule — accurate per-pod profiling).
  # HA deploys use the Kustomize overlay `infra/konfig-prod` (replicas: 2), per
  # ADR-0001 (raw YAML + Kustomize, not Helm): kubectl apply -k infra/konfig-prod
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: konfig
  template:
    metadata:
      labels:
        app: konfig
    spec:
      serviceAccountName: konfig
      # Pod SecurityContext (CU-86aj08un2). Defence-in-depth against container
      # escape + accidental root-level filesystem writes. Container-level
      # SecurityContext below tightens further (RO rootfs, drop ALL caps).
      # Notes:
      # * `runAsNonRoot: true` — kubelet refuses the pod if the image's
      #   default user is uid 0. The distroless-cc-debian13:nonroot base
      #   already runs as uid 65532; this is the belt-and-braces gate.
      # * `runAsUser: 65532` — explicit numeric uid matches the distroless
      #   `nonroot` user. Mirroring it on the pod ensures consistency if a
      #   future image-base swap loses the implicit USER directive.
      # * `seccompProfile: RuntimeDefault` — applies the container runtime's
      #   default seccomp filter (blocks ~50 syscalls). Pod-level so any
      #   future ephemeral / debug containers inherit it.
      # * `fsGroup` left unset — no volume mounts need group-writable;
      #   setting `fsGroup` would force recursive chown of mounted volumes
      #   on pod start (slow + spurious filesystem churn).
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      # ----------------------------------------------------------------------
      # netprobe sidecar (DISABLED by default)
      # ----------------------------------------------------------------------
      # Uncomment the `shareProcessNamespace` line below AND the `netprobe`
      # container block under `containers:` together to attach a busybox
      # netprobe sidecar for reading `/proc/1/net/dev` from the konfig PID
      # namespace when cAdvisor (e.g. on docker-desktop / linuxkit) does not
      # expose per-pod network metrics. Increases pod memory by ~5 MiB.
      #
      # shareProcessNamespace: true
      # ----------------------------------------------------------------------
      affinity:
        podAntiAffinity:
          # Preferred (not required) so this works on single-node kind clusters.
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: konfig
                topologyKey: kubernetes.io/hostname
      volumes:
        - name: konfig-tls
          secret:
            # Written by cert-manager from certificate.yaml. Contains
            # tls.crt, tls.key, ca.crt. defaultMode tightens perms on the
            # private key so non-root containers can still read it but no
            # other user can.
            secretName: konfig-server-tls
            defaultMode: 0o400
      containers:
        - name: konfig
          # Tag is rewritten to the merged-commit short SHA by
          # .github/workflows/publish-images.yml on every push to main.
          image: kasa288/konfig:latest
          # Container SecurityContext (CU-86aj08un2). Hardens above the
          # pod-level baseline:
          # * `readOnlyRootFilesystem: true` — konfig binary writes only to
          #   stdout (tracing) + the TLS volume mount (read-only); no temp
          #   files. snmalloc uses anonymous mmap, not /tmp. Verified via
          #   strace under the docker-desktop kind eval — no write(2) calls
          #   to the root filesystem in steady state.
          # * `allowPrivilegeEscalation: false` — blocks setuid + file
          #   capability inheritance, defence against compromised
          #   containerd/kubelet attempting privilege escalation.
          # * `capabilities.drop: ["ALL"]` — net-bind, sys-ptrace, etc all
          #   dropped. konfig binds 50051 + 9090 which are >1024 (no
          #   NET_BIND_SERVICE needed). No raw sockets, no ptrace.
          # The pod-level `seccompProfile` already covers this container;
          # repeating it here would be redundant but harmless.
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          args:
            - --grpc-addr=0.0.0.0:50051
            - --metrics-addr=0.0.0.0:9090
            - --namespace=$(KONFIG_NAMESPACE)
            - --name=$(KONFIG_NAME)
            - --secret-namespaces=konfig-system
            # mTLS — default is on; do NOT pass --tls=false in production.
            - --tls=true
            - --tls-cert=/var/run/konfig-tls/tls.crt
            - --tls-key=/var/run/konfig-tls/tls.key
            - --tls-client-ca=/var/run/konfig-tls/ca.crt
          volumeMounts:
            - name: konfig-tls
              mountPath: /var/run/konfig-tls
              readOnly: true
          env:
            - name: KONFIG_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: konfig-config
                  key: namespace
            - name: KONFIG_NAME
              valueFrom:
                configMapKeyRef:
                  name: konfig-config
                  key: name
            # ----------------------------------------------------------------
            # Observability — structured logging + OTEL tracing
            # (Phase 7: CU-86ahrwd64 logging, CU-86aj08u7k OTEL runtime config).
            #
            # Defaults are PROD-SAFE: OTEL export is OFF and the sampler is
            # pinned to 1% so flipping the kill-switch never floods a
            # collector. To ENABLE distributed tracing, ops:
            #   1. set OTEL_SDK_DISABLED=false
            #   2. set OTEL_EXPORTER_OTLP_ENDPOINT to the collector
            #      (e.g. http://otel-collector.observability:4317)
            # Both must change together — with the SDK disabled the endpoint
            # is ignored (telemetry.rs `build_tracer_provider` short-circuits).
            # ----------------------------------------------------------------
            # Kill-switch: "true" disables the OTEL SDK even if an endpoint is
            # set. Disabled by default — no exporter, no background batch task.
            - name: OTEL_SDK_DISABLED
              value: "true"
            # Collector endpoint. Empty = export off (redundant with the
            # kill-switch above; both gate it). Set to the OTLP/gRPC collector
            # when enabling.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: ""
            # Head sampler: parent-based ratio so a sampled parent trace keeps
            # its children, but new root traces sample at the ratio below.
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_traceidratio"
            # 1% — prod-safe default; raise in lower environments for debugging.
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "0.01"
            # service.name reported to the collector.
            - name: OTEL_SERVICE_NAME
              value: "konfig"
            # Structured logging: "json" emits one machine-parseable object per
            # log line for aggregation (CU-86ahrwd64). Use "pretty"/unset for
            # human-readable local dev.
            - name: RUST_LOG_FORMAT
              value: "json"
          ports:
            - name: grpc
              containerPort: 50051
            - name: metrics
              containerPort: 9090
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          # mTLS makes the built-in kubelet `grpc:` probe unusable (kubelet has
          # no client cert). Drop to TCP probes — they verify the listener is
          # up. Service-level health (cache populated, watcher connected) is
          # still exposed on the gRPC Health RPC for in-mesh callers; the
          # readiness check shifts to "cache populated → set_serving" gating
          # the LB removal via the broadcaster, which already triggers on
          # drain. See docs/runbook.md → "TLS / cert rotation".
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
        # --------------------------------------------------------------------
        # netprobe sidecar template (DISABLED by default).
        # Uncomment the block below AND `shareProcessNamespace: true` in the
        # pod spec above together. Both must be uncommented for the sidecar
        # to see the konfig PID namespace and read /proc/1/net/dev. Use this
        # when cAdvisor (e.g. on docker-desktop / linuxkit) does not expose
        # per-pod network metrics. Increases pod memory by ~5 MiB.
        # --------------------------------------------------------------------
        # - name: netprobe
        #   image: busybox:1.36
        #   imagePullPolicy: IfNotPresent
        #   command: ["sh", "-c", "sleep infinity"]
        #   securityContext:
        #     capabilities:
        #       add: ["SYS_PTRACE"]
