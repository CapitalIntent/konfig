syntax = "proto3";

package konfig.v1;

option java_package = "io.konfig.v1";
option go_package = "konfig.io/v1";

// Generic config stored in a Config CRD.
message Config {
  string namespace = 1;
  string name = 2;
  uint32 schema_version = 3;
  // JSON-encoded content — arbitrary structure defined by the consumer.
  string content_json = 4;
  string resource_version = 5;
  // Milliseconds since the snapshot was loaded into the cache.
  int64 age_ms = 6;
  // Milliseconds since the watcher lost its K8s connection. -1 when fresh.
  int64 stale_since_ms = 7;
}

message GetRequest {
  string namespace = 1;
  string name = 2;
}

message GetAllRequest {
  string namespace = 1;
}

message ApplyRequest {
  string namespace = 1;
  string name = 2;
  // Full config as YAML. Must contain a top-level `schema_version` key.
  string yaml_content = 3;
}

message ApplyResponse {
  string resource_version = 1;
}

message BatchApplyRequest {
  // Configs to apply as one batch. Every item is gated (YAML parse, JSON
  // Schema, schema_version monotonicity) BEFORE any write; if ANY item fails
  // the gate the whole batch is rejected and zero writes occur.
  repeated ApplyRequest items = 1;
}

message BatchApplyResult {
  string namespace = 1;
  string name = 2;
  string resource_version = 3;
}

message BatchApplyResponse {
  // One result per applied item, ORDERED by (namespace, name) — the same order
  // the writes landed and subscribers observe the events.
  repeated BatchApplyResult results = 1;
}

// Same fields as ApplyRequest — DryRunApply previews this exact payload.
message DryRunApplyRequest {
  string namespace = 1;
  string name = 2;
  // Full config as YAML. Must contain a top-level `schema_version` key.
  string yaml_content = 3;
}

// Preview of an Apply: current vs proposed content/version. Never the product
// of a write — the server computes this without patching K8s or the cache.
message DryRunApplyResponse {
  // JSON-encoded current `spec.content` ("" when the Config does not exist).
  string current_content_json = 1;
  // JSON-encoded `spec.content` from the submitted YAML.
  string proposed_content_json = 2;
  // Current stored schema_version (0 when the Config does not exist).
  uint32 current_schema_version = 3;
  // schema_version from the submitted YAML.
  uint32 proposed_schema_version = 4;
}

message RevertRequest {
  string namespace = 1;
  string name = 2;
  // The resourceVersion of the historical Config to roll back to.
  string to_resource_version = 3;
}

message RevertResponse {
  string resource_version = 1;
  uint32 schema_version = 2;
}

message SubscribeRequest {
  string namespace = 1;
  repeated string names = 2;
  // Resume from this resourceVersion (empty = start from current).
  string resume_resource_version = 3;
  // K8s label-selector predicate (equality + set-based syntax, e.g.
  // "tier=critical,env in (prod,staging)"). Empty = no label filter. ANDed
  // with `names`. Server-side filters the per-namespace broadcast.
  string label_selector = 4;
}

message ConfigEvent {
  enum EventType {
    ADDED = 0;
    MODIFIED = 1;
    DELETED = 2;
    // Initial-state event emitted synchronously on Subscribe with empty
    // resume_resource_version. Distinguishes the cold-start replay from
    // subsequent MODIFIED events so clients can opt-in to differentiate.
    SNAPSHOT = 3;
  }
  EventType event_type = 1;
  Config config = 2;
}

message GetSecretRequest {
  string namespace = 1;
  string name = 2;
}

message SecretResponse {
  string namespace = 1;
  string name = 2;
  uint32 schema_version = 3;
  // JSON map: {"key": "<base64_value>"}. Values are NOT decoded server-side.
  string data_json = 4;
  string resource_version = 5;
  int64 age_ms = 6;
  // Milliseconds since the watcher lost its K8s connection (cache serving
  // stale). -1 when fresh. Mirrors Config.stale_since_ms.
  int64 stale_since_ms = 7;
}

message GetAllSecretsRequest {
  string namespace = 1;
}

message ApplySecretRequest {
  string namespace = 1;
  string name = 2;
  // YAML map key→plaintext. Server base64-encodes before patching.
  string yaml_content = 3;
}

message ApplySecretResponse {
  string resource_version = 1;
}

message SubscribeSecretsRequest {
  string namespace = 1;
  repeated string names = 2;
  string resume_resource_version = 3;
}

message SecretEvent {
  enum EventType {
    ADDED = 0;
    MODIFIED = 1;
    DELETED = 2;
    SNAPSHOT = 3;
  }
  EventType event_type = 1;
  SecretResponse secret = 2;
}

service KonfigService {
  // Get a single config by namespace and name.
  rpc Get(GetRequest) returns (Config);
  // Stream all configs in a namespace (one per cached entry).
  rpc GetAll(GetAllRequest) returns (stream Config);
  // Create or update a config (YAML → CRD patch with schema_version check).
  rpc Apply(ApplyRequest) returns (ApplyResponse);
  // Apply several configs as one atomic-GATE batch. Every item is validated
  // (YAML parse, JSON Schema, schema_version monotonicity) BEFORE any write;
  // if ANY item fails the gate the whole batch is rejected and ZERO writes
  // occur. After the gate passes, items are applied sequentially in
  // (namespace, name) order, so the writes land — and subscribers observe the
  // events — in that deterministic order.
  //
  // NOT a true cross-object transaction: Kubernetes server-side apply has no
  // atomic multi-resource write, so "all-or-none" holds only at the gate. The
  // gate eliminates the common stale-version torn-read cause of a partial
  // apply, but a mid-batch apiserver error (e.g. exhausted-409, concurrent
  // writer) AFTER the gate can still leave a partial apply. Do not rely on this
  // for true atomicity.
  rpc BatchApply(BatchApplyRequest) returns (BatchApplyResponse);
  // Preview what an Apply would change WITHOUT touching the K8s API or cache.
  // Runs the same schema_version monotonicity gate as Apply and returns the
  // current vs proposed content/version. Non-mutating + idempotent: N calls
  // produce byte-identical output and zero kube-apiserver writes.
  rpc DryRunApply(DryRunApplyRequest) returns (DryRunApplyResponse);
  // Roll back a Config to a historical resourceVersion.  Looks up the historical
  // content via a K8s list with resourceVersionMatch=Exact, bumps the
  // schema_version above the current value to preserve monotonicity, and
  // re-applies through the standard Apply code path.
  rpc Revert(RevertRequest) returns (RevertResponse);
  // Live config change stream. Pass resume_resource_version to replay missed
  // events on reconnect. Returns RESOURCE_EXHAUSTED if subscriber falls behind
  // the broadcast ring buffer.
  rpc Subscribe(SubscribeRequest) returns (stream ConfigEvent);
  // Get a single secret by namespace and name.
  rpc GetSecret(GetSecretRequest) returns (SecretResponse);
  // Stream all secrets in a namespace.
  rpc GetAllSecrets(GetAllSecretsRequest) returns (stream SecretResponse);
  // Create or update a managed secret (YAML key→plaintext, server base64-encodes).
  rpc ApplySecret(ApplySecretRequest) returns (ApplySecretResponse);
  // Live secret change stream for a managed namespace. Same semantics as
  // Subscribe.
  rpc SubscribeSecrets(SubscribeSecretsRequest) returns (stream SecretEvent);
}
