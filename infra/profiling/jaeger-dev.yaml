# Jaeger all-in-one for LOCAL trace-evidence capture (Phase 7, CU-86ahzwj5b).
# Not a production manifest — in-memory span store, no auth, single replica.
# OTLP gRPC :4317 (konfig OTEL_EXPORTER_OTLP_ENDPOINT target), query UI/API :16686.
# See docs/observability/README.md for the full reproduce-locally flow.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: konfig-system
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.62.0
          imagePullPolicy: IfNotPresent
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
            - name: SPAN_STORAGE_TYPE
              value: "memory"
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: query-ui
              containerPort: 16686
          readinessProbe:
            httpGet:
              path: /
              port: 16686
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: konfig-system
  labels:
    app: jaeger
spec:
  selector:
    app: jaeger
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: query-ui
      port: 16686
      targetPort: 16686
