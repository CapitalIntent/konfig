name: Publish images
on:
  # DISABLED on push: the required Docker Hub + release secrets are not
  # provisioned on this repo (`gh secret list` shows only BUILDBUDDY_API_KEY).
  # Every prior auto-run failed at the docker/login-action step with
  # "Username and password required". Re-enable the push trigger after
  # provisioning:
  #   gh secret set DOCKERHUB_USERNAME   --repo CapitalIntent/konfig
  #   gh secret set DOCKERHUB_TOKEN      --repo CapitalIntent/konfig
  #   gh secret set KONFIG_RELEASE_TOKEN --repo CapitalIntent/konfig
  workflow_dispatch:

# Required repository secrets (must be set before the workflow can succeed):
#   DOCKERHUB_USERNAME      — Docker Hub user for push.
#   DOCKERHUB_TOKEN         — Docker Hub PAT with write:packages on the
#                             kasa288/konfig* repositories.
#   KONFIG_RELEASE_TOKEN    — PAT with `contents: write` on this repo
#                             (so the pin-back commit can land on main
#                             past branch protection's default `GITHUB_TOKEN`).
#
# Skips itself when the commit message contains `[skip publish]` so the
# pin-back commit doesn't loop into another publish run.
#
# Native-matrix per-arch build: each arch's image is built + pushed on its
# own native runner (no Bazel sysroot / cross-compile wiring). The final
# manifest fan-in step uses `docker buildx imagetools create` to assemble
# the multi-arch tag from the per-arch tags pushed in the matrix jobs.

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_push_per_arch:
    name: Build + push ${{ matrix.arch }}
    if: "!contains(github.event.head_commit.message, '[skip publish]')"
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: blacksmith-2vcpu-ubuntu-2404
          - arch: arm64
            runner: blacksmith-2vcpu-ubuntu-2404-arm
    runs-on: ${{ matrix.runner }}
    env:
      BB_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: bazelbuild/setup-bazelisk@v3

      - name: Install protoc
        run: sudo apt-get update -q && sudo apt-get install -y -q protobuf-compiler

      - name: Configure Bazel for CI (BuildBuddy remote cache)
        run: |
          cat > .bazelrc.user << EOF
          common --config=ci
          common --remote_cache=grpcs://remote.buildbuddy.io
          common --remote_header=x-buildbuddy-api-key=$BB_API_KEY
          build --build_metadata=BRANCH_NAME=${{ github.ref_name }}
          build --build_metadata=COMMIT_SHA=${{ github.sha }}
          build --build_metadata=REPO_URL=https://github.com/jayakasadev/konfig
          EOF

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push konfig (${{ matrix.arch }})
        run: bazel run --stamp //docker/konfig:push_${{ matrix.arch }}

      - name: Push konfig-cli (${{ matrix.arch }})
        run: bazel run --stamp //docker/konfig-cli:push_${{ matrix.arch }}

      - name: Push konfig-loadtest (${{ matrix.arch }})
        run: bazel run --stamp //docker/konfig-loadtest:push_${{ matrix.arch }}

  assemble_manifests_and_pin:
    name: Assemble multi-arch manifests + pin SHAs
    needs: build_push_per_arch
    if: "!contains(github.event.head_commit.message, '[skip publish]')"
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.KONFIG_RELEASE_TOKEN }}

      - name: Resolve short SHA
        id: sha
        run: echo "short=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Assemble multi-arch manifests
        run: |
          set -euo pipefail
          SHA="${{ steps.sha.outputs.short }}"
          # For each repo, combine the per-arch tags pushed above into a
          # multi-arch index tagged both <sha> and latest.
          for repo in kasa288/konfig kasa288/konfig-cli kasa288/konfig-loadtest; do
            for target in "$SHA" "latest"; do
              docker buildx imagetools create \
                --tag "$repo:$target" \
                "$repo:$SHA-amd64" \
                "$repo:$SHA-arm64"
            done
          done

      - name: Pin manifest tags to short SHA
        run: ./tools/pin-image-tags.sh "${{ steps.sha.outputs.short }}"

      - name: Commit pinned manifests
        run: |
          if git diff --quiet; then
            echo "Manifests already pinned to ${{ steps.sha.outputs.short }}; nothing to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add infra/konfig/deployment.yaml \
                  infra/konfig-loadtest/job.yaml
          git commit -m "ci: pin image tags to ${{ steps.sha.outputs.short }} [skip publish]"
          git push origin HEAD:main
