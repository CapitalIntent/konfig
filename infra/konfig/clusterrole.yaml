apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: konfig-config-access
rules:
  - apiGroups: ["konfig.io"]
    resources: ["configs"]
    verbs: ["get", "list", "watch", "patch", "create"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
