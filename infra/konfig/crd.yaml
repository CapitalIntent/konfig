apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: configs.konfig.io
spec:
  group: konfig.io
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - schema_version
              properties:
                schema_version:
                  type: integer
                  minimum: 0
                  description: Monotonically increasing version. Apply rejects non-increasing values.
                content:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  description: Arbitrary configuration payload. Any valid YAML/JSON object.
  scope: Namespaced
  names:
    plural: configs
    singular: config
    kind: Config
    shortNames:
      - cfg
